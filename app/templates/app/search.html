{% extends 'app/base.html' %}
{% load static %}
{% block title %}Search Result{% endblock title %}

{% block main-content %}

<div class="container my-5">
    <div class="row">

        {% for prod in product %}
        <div class="col-sm-4 text-center mb-4">

            <a href="{% url 'product-detail' prod.id %}" class="btn">

                <div class="item">
                    <img src="{{ prod.product_image.url }}"
                         width="300"
                         height="200">

                    <div class="fw-bold">
                        {{ prod.title }}
                    </div>

                    <div class="fw-bold">
                        Rs. {{ prod.discounted_price }}/-
                        <small class="fw-light text-decoration-line-through">
                            {{ prod.selling_price }}
                        </small>
                    </div>

                </div>

            </a>

        </div>
        {% endfor %}

    </div>
</div>

{% endblock main-content %}
